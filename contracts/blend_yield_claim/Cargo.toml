[package]
name = "blend-yield-claim"
version = "0.1.0"
edition = "2021"
description = "Blend yield-claim policy — generated by OZ Policy Builder"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
soroban-sdk      = { workspace = true }
stellar-accounts = { workspace = true }

[dev-dependencies]
soroban-sdk = { workspace = true, features = ["testutils"] }

[features]
testutils = ["soroban-sdk/testutils"]
